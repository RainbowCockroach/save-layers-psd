name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --name SaveLayersPSD --windowed save_layers.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveLayersPSD-windows
          path: dist/SaveLayersPSD.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: |
          pyinstaller save_layers_macos.spec

      - name: Zip app bundle
        run: |
          cd dist
          zip -r SaveLayersPSD-macos.zip SaveLayersPSD.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaveLayersPSD-macos
          path: dist/SaveLayersPSD-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-increment version
        id: version
        run: |
          # Find the latest vX.Y.Z tag, default to v0.0.0 if none
          LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          # Strip 'v' prefix, split into parts
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          # Increment patch
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $LATEST -> $NEW_TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            SaveLayersPSD-windows/SaveLayersPSD.exe
            SaveLayersPSD-macos/SaveLayersPSD-macos.zip
          generate_release_notes: true
